# Prompt: cwd, git branch, in-flight git ops, full git status, input indicator (vi-aware)
# https://starship.rs/config/
format = "$directory$git_branch$git_state$git_status$character"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
format = "[($branch)]($style) "
style = "bold magenta"

# merge / rebase / cherry-pick / bisect … with step counts when present
[git_state]
format = '[\($state( $progress_current/$progress_total)\)]($style) '
style = "bold yellow"

# Working tree + index + upstream (ahead/behind / diverged)
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold #fab387"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
conflicted = "=${count}"
untracked = "?${count}"
# stash marker + count ($ must be escaped in TOML double-quotes)
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[character]
success_symbol = "[λ](bold green) "
error_symbol = "[λ](bold red) "
vimcmd_symbol = "[V](bold yellow) "
vimcmd_replace_one_symbol = "[R](bold yellow) "
vimcmd_replace_symbol = "[R](bold yellow) "
vimcmd_visual_symbol = "[v](bold yellow) "
