palette = "catppuccin_mocha"

# https://starship.rs/config/
format = "$directory$character"
right_format = "$git_branch$git_state$git_status"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold sky"

[git_branch]
format = "[($branch)]($style) "
style = "bold mauve"

# merge / rebase / cherry-pick / bisect … with step counts when present
[git_state]
format = ' [\($state( $progress_current/$progress_total)\)]($style)'
style = "bold yellow"

# Working tree + index + upstream (ahead/behind / diverged)
[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'
style = "bold peach"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
conflicted = "=${count}"
untracked = "?${count}"
# stash marker + count ($ must be escaped in TOML double-quotes)
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[character]
success_symbol = "[>](bold green) "
error_symbol = "[>](bold red) "
vimcmd_symbol = "[<](bold yellow) "
vimcmd_replace_one_symbol = "[R](bold yellow) "
vimcmd_replace_symbol = "[R](bold yellow) "
vimcmd_visual_symbol = "[v](bold yellow) "

